<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Session - Krushi AI Care</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            max-width: 400px;
            width: 90%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 { margin-bottom: 20px; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn:hover { background: #16a34a; }
        .status {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Session Manager</h1>
        <div class="status" id="status">
            Checking session...
        </div>
        <button class="btn" onclick="clearAndRedirect()">Clear Session & Go to Landing Page</button>
        <button class="btn" onclick="checkStatus()">Check Session Status</button>
    </div>

    <script>
        function checkStatus() {
            const session = localStorage.getItem('kac_session');
            const statusDiv = document.getElementById('status');
            
            if (session) {
                const parsed = JSON.parse(session);
                statusDiv.innerHTML = `
                    <strong>✅ Session Found</strong><br>
                    User: ${parsed.name}<br>
                    Email: ${parsed.email}
                `;
            } else {
                statusDiv.innerHTML = '<strong>❌ No Session Found</strong><br>You will see the Landing page';
            }
        }

        function clearAndRedirect() {
            localStorage.removeItem('kac_session');
            document.getElementById('status').innerHTML = '<strong>✅ Session Cleared!</strong><br>Redirecting...';
            setTimeout(() => {
                window.location.href = 'landing.html';
            }, 1000);
        }

        // Check on load
        checkStatus();
    </script>
</body>
</html>
